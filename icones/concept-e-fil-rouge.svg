<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F2F52"/>
      <stop offset="100%" stop-color="#185FA5"/>
    </linearGradient>
    <filter id="ombre" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="12" flood-color="#00000050"/>
    </filter>
    <filter id="glow-rouge" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#EF4444" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Fond bleu profond -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Carte calendrier -->
  <g filter="url(#ombre)">
    <!-- Corps de la carte -->
    <rect x="76" y="108" width="360" height="296" rx="18" fill="white"/>
    <!-- Header bleu -->
    <rect x="76" y="108" width="360" height="64" rx="18" fill="#185FA5"/>
    <rect x="76" y="154" width="360" height="18" fill="#185FA5"/>

    <!-- Grille: 5 cols × 4 rows de points (sans texte) -->
    <!-- Col x: 131, 196, 261, 326, 391 -->
    <!-- Row y: 225, 278, 331, 384 -->

    <!-- Row 1 -->
    <circle cx="131" cy="225" r="10" fill="#DBEAFE"/>
    <circle cx="196" cy="225" r="10" fill="#DBEAFE"/>
    <circle cx="261" cy="225" r="10" fill="#DBEAFE"/>
    <circle cx="326" cy="225" r="10" fill="#DBEAFE"/>
    <circle cx="391" cy="225" r="10" fill="#DBEAFE"/>

    <!-- Row 2 -->
    <circle cx="131" cy="278" r="10" fill="#DBEAFE"/>
    <circle cx="196" cy="278" r="10" fill="#DBEAFE"/>
    <circle cx="261" cy="278" r="10" fill="#DBEAFE"/>
    <circle cx="326" cy="278" r="10" fill="#DBEAFE"/>
    <circle cx="391" cy="278" r="10" fill="#DBEAFE"/>

    <!-- Row 3 -->
    <circle cx="131" cy="331" r="10" fill="#DBEAFE"/>
    <circle cx="196" cy="331" r="10" fill="#DBEAFE"/>
    <circle cx="261" cy="331" r="10" fill="#DBEAFE"/>
    <circle cx="326" cy="331" r="10" fill="#DBEAFE"/>
    <circle cx="391" cy="331" r="10" fill="#DBEAFE"/>

    <!-- Row 4 -->
    <circle cx="131" cy="384" r="10" fill="#DBEAFE"/>
    <circle cx="196" cy="384" r="10" fill="#DBEAFE"/>
    <circle cx="261" cy="384" r="10" fill="#DBEAFE"/>
    <circle cx="326" cy="384" r="10" fill="#DBEAFE"/>
  </g>

  <!-- Fil rouge reliant les dates marquées -->
  <!-- Points marqués: (196,225), (326,278), (196,331), (326,384) -->
  <path d="M 196 225 C 261 225 261 278 326 278 C 261 278 261 331 196 331 C 261 331 261 384 326 384"
        fill="none"
        stroke="#EF4444"
        stroke-width="5"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-dasharray="none"
        opacity="0.9"/>

  <!-- Points marqués (par-dessus le fil) -->
  <circle cx="196" cy="225" r="16" fill="#EF4444" filter="url(#glow-rouge)"/>
  <circle cx="196" cy="225" r="8"  fill="white"/>

  <circle cx="326" cy="278" r="16" fill="#EF4444" filter="url(#glow-rouge)"/>
  <circle cx="326" cy="278" r="8"  fill="white"/>

  <circle cx="196" cy="331" r="16" fill="#EF4444" filter="url(#glow-rouge)"/>
  <circle cx="196" cy="331" r="8"  fill="white"/>

  <circle cx="326" cy="384" r="16" fill="#EF4444" filter="url(#glow-rouge)"/>
  <circle cx="326" cy="384" r="8"  fill="white"/>
</svg>
