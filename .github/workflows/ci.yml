name: CI — Build & Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Sélectionner Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Build
        run: |
          xcodebuild build \
            -project ICSMulti/ICSMulti.xcodeproj \
            -scheme ICSMulti \
            -destination 'platform=macOS' \
            -quiet

      - name: Tests unitaires
        run: |
          xcodebuild test \
            -project ICSMulti/ICSMulti.xcodeproj \
            -scheme ICSMulti \
            -destination 'platform=macOS' \
            -quiet
